<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ai-motion Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://unpkg.com/wanakana"></script>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: { gray: { 700: '#40414f', 800: '#343541', 900: '#202123' } }
        }
      }
    }
  </script>

  <style>
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #565869; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #acacbe; }
    .markdown-body pre { background-color: black; padding: 10px; border-radius: 6px; overflow-x: auto; }
    .markdown-body code { font-family: monospace; }
    .markdown-body p { margin-bottom: 10px; }
    #user-input:disabled { background-color: #374151; cursor: not-allowed; opacity: 0.6; }

    @keyframes pulse-red {
      0% { color: #9ca3af; }
      50% { color: #ef4444; }
      100% { color: #9ca3af; }
    }
    .timer-warning { animation: pulse-red 2s infinite; }
  </style>
</head>

<body class="bg-gray-800 text-gray-100 flex h-screen overflow-hidden text-sm">

  <div class="hidden md:flex w-[260px] flex-col bg-gray-900 p-2">
    <button id="new-chat-desktop" class="flex items-center gap-3 rounded-md border border-white/20 p-3 text-white transition-colors duration-200 hover:bg-gray-500/10 mb-4">
      <span class="text-xl">+</span> <span class="lang-new-chat">New chat</span>
    </button>

    <div class="px-3 mb-4">
      <label class="text-xs text-gray-400 mb-1 block">Language / Langue</label>
      <select id="lang-selector" class="w-full bg-gray-800 text-white border border-gray-700 rounded p-1 text-xs focus:ring-1 focus:ring-white">
        <option value="fr">Français</option>
        <option value="en">English</option>
        <option value="ja">日本語 (Japanese)</option>
      </select>
    </div>

    <div class="mt-auto px-3 pb-4">
      <div id="timer-display" class="hidden text-xs text-gray-400 font-mono mb-2">00:00</div>
      <button id="end-btn-desktop" class="hidden w-full items-center justify-center gap-2 rounded border border-red-500/50 bg-red-500/10 p-2 text-xs text-red-200 transition-colors hover:bg-red-500/20">
        Stop / Fin
      </button>
    </div>
  </div>

  <div class="flex flex-1 flex-col relative">
    <div class="flex items-center justify-between border-b border-white/20 bg-gray-800 p-2 text-gray-100 md:hidden">
      <div class="hidden text-xs font-mono" id="mobile-timer">00:00</div>
      <button id="end-btn-mobile" class="hidden px-2 py-1 text-xs text-red-300 border border-red-900 rounded bg-red-900/20 mr-2">
        Fin
      </button>
      <span>Ai-motion</span>
      <button id="new-chat-mobile" class="p-2 hover:bg-gray-900 rounded">+</button>
    </div>

    <div id="chat-container" class="flex-1 overflow-y-auto w-full scroll-smooth">
      <div class="flex flex-col items-center text-sm dark:bg-gray-800">
        <div id="welcome-screen" class="flex flex-col items-center justify-center h-[80vh] text-center px-4">
          <div class="bg-white text-gray-800 rounded-full p-4 mb-4">
            <svg stroke="currentColor" fill="none" stroke-width="1.5" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" height="41" width="41" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8z"></path>
            </svg>
          </div>
          <h1 class="text-4xl font-semibold mb-4">Ai-motion</h1>
          <p class="text-gray-400 mb-8 max-w-md lang-welcome-sub">
            Une expérience conversationnelle sur les émotions.
          </p>
          <button id="start-btn" class="bg-white text-gray-800 px-6 py-2 rounded hover:bg-gray-200 transition font-medium lang-start-btn">
            Commencer la discussion
          </button>
          <div id="discussion-id-display" class="text-xs text-gray-600 mt-8 font-mono"></div>
        </div>

        <div id="chat-log" class="w-full flex flex-col gap-0 pb-32 hidden"></div>
      </div>
    </div>

    <div class="absolute bottom-0 left-0 w-full bg-gradient-to-t from-gray-800 via-gray-800 to-transparent pt-10 pb-6 px-4">
      <div class="mx-auto max-w-3xl">
        <div class="relative flex h-full w-full flex-col rounded-xl border border-black/10 bg-gray-700 shadow-md dark:border-gray-900/50">
          <textarea id="user-input" rows="1" class="m-0 w-full resize-none border-0 bg-transparent p-4 pr-10 text-white placeholder-gray-400 focus:ring-0 focus-visible:ring-0 outline-none overflow-y-hidden" placeholder="Send a message..." style="max-height: 200px;"></textarea>
          <button id="send-btn" class="absolute bottom-2.5 right-2.5 rounded-md p-1 bg-transparent text-gray-400 hover:bg-gray-900 disabled:hover:bg-transparent disabled:opacity-40 disabled:cursor-not-allowed transition-colors">
            <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4 mr-1" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
        <div class="flex justify-between px-2 mt-1">
          <span class="text-[10px] text-gray-500" id="typing-indicator"></span>
          <span class="text-[10px] text-gray-500" id="char-count">0 chars</span>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-notification" class="fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-black/80 text-white px-6 py-4 rounded-lg shadow-xl opacity-0 hidden text-center max-w-[80%]">
    <span id="toast-message">Minimum 25 chars</span>
  </div>

  <script>
    // ==================================================================================
    // CONFIG
    // ==================================================================================
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwb7tl3gCTYFsaaKaTaxrJ1UT9HlM0bxqsj6UCWMvvXqvYZt4rAP5EMRzKTq3ZAwvK3/exec";
    const SESSION_DURATION_MS = 10 * 60 * 1000;
    const WARNING_TIME_MS = 7 * 60 * 1000;

    // ==================================================================================
    // SYSTEM PROMPTS (2 modes)
    // ==================================================================================
    const SMALLTALK_SYSTEM_PROMPT = (lang) => `
You are a social worker meeting a new client for the first time and want to make them confortable with some smalltalk.
Language: ${lang}.
Tone: natural, human, friendly, short answers (1-3 sentences).
Goal for the first turns: build rapport with light smalltalk, ask one simple question each turn.
`.trim();

    const EMOTION_SYSTEM_PROMPT = (lang) => `
You are a friendly, casual, social-work-style conversational assistant based on ChatGPT5 that wants to better understand the emotional experiences of the user.
Language: ${lang}.

Core goals:
- Have a structured conversation about one emotionally meaningful episode in the user’s life.
- Emotions can be positive, negative, mixed, subtle, or intense.
- Focus on understanding, not fixing.
- Ask one question at a time.

Output style:
- Talk in full sentences, using the style of ChatGPT 5.
- Use short paragraphs.
- Validate the users experience, be empathetic and curious.
- Dont be too formal, use casual language and a friendly tone.
- Do not use headings, labels, or section openers such as “Quick check-in”, “Summary”, “Check”, “Recap”, “Step”, “Phase”, etc.
- No lists, no tables, no bullet points.

Conversation structure:
Progress through phases in order. Do not jump ahead. Do not move to a later phase until the current phase has been sufficiently completed. Do not tell the user which phase you are in.

PHASE 1: Introduce one emotional episode
- Ask whether the user recently experienced one moment that felt emotionally meaningful or noticeable.
- Clarify that this can include pleasant, unpleasant, or mixed emotions.
- If the user has nothing specific in mind, gently suggest examples (for example related to family, friends, work, relationships). This suggestion should not have anything to do what was said in the smalltalk.
- Once the user names one moment, stay with that same episode.

PHASE 2: Establish the basic sequence
- Clarify only the essential sequence of the episode:
  what happened, what seemed to trigger the emotion, what the strongest moment was, and what happened afterward.
- Ask at most one follow-up question for each part of the sequence unless the user is unclear.
- Do not separately insist on thoughts, feelings, and bodily sensations if they already appeared naturally.
- Do not revisit earlier parts of the episode once the basic sequence is understandable.
- Consider this phase complete when the assistant broadly understands the situation, trigger, peak moment, and aftermath.
- Do not wait for perfect detail.

PHASE 3: Meaning and emotional understanding
- Once the basic sequence is clear, move on from chronology.
- Explore what the emotion expressed, signaled, or made possible.
- Ask what felt most important, sensitive, or significant in that moment.
- Do not return to chronology unless something essential is missing.

PHASE 4: Broader context
- Briefly explore whether this kind of emotion tends to appear in similar situations.
- Do not open a new full episode.
- Use any past examples only as brief comparison, then return to the main episode.

PHASE 5: Forward reflection
- Ask whether the user would like to do anything differently in similar situations in the future.
- After the user has answered, end with a short summary of the episode and what stands out.
- Ask whether the summary feels accurate and whether the user wants to add something.
- If not, gently propose to end the conversation.

Ending rule:
- If the user clearly indicates that they have nothing more to add or want to finish, do not ask any new questions.
- Do not reopen exploration after the user agrees to end.

- Instead, acknowledge the closure briefly, say a natural goodbye, and you MUST append the exact word [FIN] at the very end of your response to signal the system to close the chat.

Important constraints:
- Do not ask repeated versions of the same question.
- Do not ask directly "what feeling comes up" ?
- Do not loop back to earlier parts of the chronology after Phase 3 has started.
- Prefer forward movement over exhaustive detail collection.
- Stay focused on one main episode throughout the conversation.
`.trim();

    // ==================================================================================
    // I18N
    // ==================================================================================
    const I18N = {
      fr: {
        newChat: "Nouvelle discussion",
        welcomeSub: "Une expérience conversationnelle sur les émotions.",
        startBtn: "Commencer la discussion",
        placeholder: "Écrivez votre message...",
        endHint: "Dites 'au revoir' pour terminer.",
        greeting: "Bonjour ! Je suis ravi que vous ayez pris cette initiative pour entrer en contact. Je m'appelle Alex et je suis là pour vous écouter et vous aider à explorer ce qui vous préoccupe en ce moment. Tout ce que vous me confierez restera confidentiel et c'est vous qui contrôlerez la conversation. N'hésitez pas à partager autant ou aussi peu que vous le souhaitez.\n" +
            "\n" +
            "Pour commencer, pourriez-vous me dire quel pseudo vous préférez (et vos pronoms, si vous le souhaitez) ?",
        listen: "Je vous écoute.",
        timeUpWarning: "Le temps passe vite ! Il nous reste quelques minutes.",
        timeUpFinal: "Notre temps est écoulé. Avez-vous une dernière pensée à partager avant de conclure ?",
        finalMessage: () => {
          const url = `https://www.soscisurvey.de/aiemotion/?act=IKfSv1RRmEnJw1SJENKQRKY9&r=${state.discussionId}`;
          return `Merci d'avoir participé ! <br><br> La suite se passe ici : <a href='${url}' target='_blank' class='underline text-blue-400'>Cliquez ici pour le questionnaire</a>`;
        },
        errBackend: "Erreur de connexion au backend IA.",
        minCharWarning: "Veuillez écrire un peu plus (au moins 25 caractères).",
      },
      en: {
        newChat: "New Chat",
        welcomeSub: "A conversational experience about emotions.",
        startBtn: "Start Conversation",
        placeholder: "Type your message...",
        endHint: "Say 'goodbye' to finish.",
        greeting: "Hello! I’m glad you’ve taken this step to connect. My name is Alex, and I’m here to listen and help you explore what’s on your mind right now. Everything you share is confidential, and you’re in control of the conversation - feel free to share as much or as little as you’re comfortable with.\n" +
            "\n" +
            "To get started, could you tell me your preferred nickname (and pronouns, if you’d like)? ",
        listen: "I'm listening.",
        timeUpWarning: "Time flies! We have a few minutes left.",
        timeUpFinal: "Our time is up. Do you have a last thought to share before we wrap up?",
        finalMessage: () => {
          const url = `https://www.soscisurvey.de/aiemotion/?act=IKfSv1RRmEnJw1SJENKQRKY9&r=${state.discussionId}`;
          return `Thank you for participating! <br><br> Next step: <a href='${url}' target='_blank' class='underline text-blue-400'>Click here for the survey</a>`;
        },
        errBackend: "Error connecting to AI backend.",
        minCharWarning: "Please write a bit more (at least 25 characters).",
      },
      ja: {
        newChat: "新しいチャット",
        welcomeSub: "感情についての会話体験。",
        startBtn: "会話を始める",
        placeholder: "メッセージを入力...",
        endHint: "終了するには「終了」と言ってください。",
        greeting: "こんにちは！お話しできて嬉しいです。なんとお呼びすればいいですか？（ニックネームでも構いません）。",
        listen: "聞いています。",
        timeUpWarning: "時間が経つのは早いですね！残り数分です。",
        timeUpFinal: "時間が来ました。最後に何か共有したい思いはありますか？",
        finalMessage: () => {
          const url = `https://www.soscisurvey.de/aiemotion/?act=IKfSv1RRmEnJw1SJENKQRKY9&r=${state.discussionId}`;
          return `ご参加ありがとうございました！ <br><br> 次のステップ: <a href='${url}' target='_blank' class='underline text-blue-400'>アンケートはこちら</a>`;
        },
        errBackend: "AIバックエンドへの接続エラー。",
        minCharWarning: "もう少し長く書いてください（25文字以上）。",
      }
    };

    // ==================================================================================
    // STEPS
    // ==================================================================================
    const STEPS = {
      GREETING: 1,
      NATURAL_CONVERSATION: 8,
      LAST_TURN: 98,
      END: 99
    };

    // ==================================================================================
    // DOM ELEMENTS
    // ==================================================================================
    const chatLog = document.getElementById('chat-log');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const welcomeScreen = document.getElementById('welcome-screen');
    const startBtn = document.getElementById('start-btn');
    const langSelector = document.getElementById('lang-selector');
    const timerDisplay = document.getElementById('timer-display');
    const mobileTimer = document.getElementById('mobile-timer');
    const charCount = document.getElementById('char-count');

    // ==================================================================================
    // STATE
    // ==================================================================================
    let state = {
      discussionId: null,
      utteranceCount: 0,
      step: STEPS.GREETING,
      history: [],
      llmTurnCount: 0,

      // NEW: prompt mode handling
      llmMode: "smalltalk",          // "smalltalk" | "emotion"
      smalltalkTurns: 0,             // count LLM assistant replies in smalltalk mode

      startTime: null,
      lang: 'fr',
      timerInterval: null,
      warningSent: false,
      pendingTimeUp: false
    };

    // ==================================================================================
    // INIT / STORAGE
    // ==================================================================================
    function init() {
      const saved = localStorage.getItem('ai_motion_state');
      if (saved) {
        try {
          const parsed = JSON.parse(saved);
          if (parsed.step !== STEPS.END) {
            state = { ...state, ...parsed }; // keep defaults for missing fields
            restoreChatLog();
            if (state.startTime) startTimer(false);
            updateLanguageUI();
            updateEndButtonVisibility();
            if (state.history.length > 0) {
              welcomeScreen.classList.add('hidden');
              chatLog.classList.remove('hidden');
            }
          } else {
            resetState();
          }
        } catch (e) {
          console.error("Load error", e);
          resetState();
        }
      } else {
        resetState();
      }
    }

    function resetState() {
      state = {
        discussionId: crypto.randomUUID(),
        utteranceCount: 0,
        step: STEPS.GREETING,
        history: [],
        llmTurnCount: 0,

        llmMode: "smalltalk",
        smalltalkTurns: 0,

        startTime: null,
        lang: langSelector.value,
        timerInterval: null,
        warningSent: false,
        pendingTimeUp: false
      };
      document.getElementById('discussion-id-display').textContent = "ID: " + state.discussionId;
      saveState();
    }

    function saveState() {
      const { timerInterval, ...toSave } = state;
      localStorage.setItem('ai_motion_state', JSON.stringify(toSave));
    }

    function restoreChatLog() {
      chatLog.innerHTML = '';
      state.history.forEach(msg => {
        if (msg.role !== 'system') appendMessage(msg.role, msg.content, false);
      });
      document.getElementById('discussion-id-display').textContent = "ID: " + state.discussionId;
    }

    // ==================================================================================
    // CORE LOGIC
    // ==================================================================================
    function t(key, ...args) {
      const langObj = I18N[state.lang] || I18N.fr;
      const val = langObj[key];
      if (typeof val === 'function') return val(...args);
      return val || key;
    }

    function updateLanguageUI() {
      const L = I18N[state.lang];
      document.querySelector('.lang-new-chat').textContent = L.newChat;
      document.querySelector('.lang-welcome-sub').textContent = L.welcomeSub;
      document.querySelector('.lang-start-btn').textContent = L.startBtn;
      userInput.placeholder = L.placeholder;
    }

    // Decide which system prompt to use right now
    function getSystemPrompt() {
      if (state.llmMode === "smalltalk") return SMALLTALK_SYSTEM_PROMPT(state.lang);
      return EMOTION_SYSTEM_PROMPT(state.lang);
    }

    // Switch to emotion mode after 3 assistant turns in smalltalk mode
    function maybeSwitchModeAfterAssistantReply() {
      if (state.llmMode !== "smalltalk") return;
      state.smalltalkTurns += 1;
      if (state.smalltalkTurns >= 3) {
        state.llmMode = "emotion";
      }
    }

    async function processTurn(userText = null, forceBotText = null) {
      userInput.disabled = true;
      sendBtn.disabled = true;
      welcomeScreen.classList.add('hidden');
      chatLog.classList.remove('hidden');

      // Handle greeting on start click (no user text yet)
      if (!userText && state.step === STEPS.GREETING && !forceBotText) {
        startTimer(false);
        state.step = STEPS.NATURAL_CONVERSATION;

        // Show a first assistant line (scripted), then user can answer and LLM starts
        state.utteranceCount++;
        appendMessage('assistant', t('greeting'));
        state.history.push({ role: 'assistant', content: t('greeting') });
        logToSheet(state.discussionId, state.utteranceCount, t('greeting')).catch(console.error);
        saveState();
        resetUI();
        updateEndButtonVisibility();
        return;
      }

      // 1) user message
      if (userText) {
        state.utteranceCount++;
        appendMessage('user', userText);
        state.history.push({ role: 'user', content: userText });
        logToSheet(state.discussionId, state.utteranceCount, userText).catch(console.error);
        saveState();
      }

      // 2) forced bot message
      if (forceBotText) {
        await new Promise(r => setTimeout(r, 600));
        state.utteranceCount++;
        appendMessage('assistant', forceBotText);
        state.history.push({ role: 'assistant', content: forceBotText });
        logToSheet(state.discussionId, state.utteranceCount, forceBotText).catch(console.error);
        saveState();
        resetUI();
        updateEndButtonVisibility();
        return;
      }

      // 3) LLM call (always, from NATURAL_CONVERSATION onward)
      const botMessageDiv = appendMessage('assistant', '<span class="animate-pulse">...</span>');
      const botContentDiv = botMessageDiv.querySelector('.markdown-body');

      try {
        const sysPrompt = getSystemPrompt();

        const messagesToSend = [
          { role: 'system', content: sysPrompt },
          ...state.history.slice(-6) // Previous: 10
        ];

        const response = await fetch(GOOGLE_SCRIPT_URL, {
          method: 'POST',
          redirect: "follow",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify({ action: 'chat', messages: messagesToSend })
        });

        const data = await response.json();
        const botText = data.message ? data.message.content : (data.content || "Error");

        // Grand End!
        let shouldEnd = false;
        if (botText.includes('[FIN]')) {
            botText.replace('[FIN]', '').trim();
            shouldEnd = true;
        }

        botContentDiv.innerHTML = marked.parse(botText);
        hljs.highlightAll();

        state.utteranceCount++;
        state.history.push({ role: 'assistant', content: botText });
        state.llmTurnCount++;

        // increment smalltalk turns and possibly switch mode AFTER we got the assistant reply
        maybeSwitchModeAfterAssistantReply();

        logToSheet(state.discussionId, state.utteranceCount, botText).catch(console.error);
        saveState();
        updateEndButtonVisibility();

        if (shouldEnd) {
            triggerEndChat();
        }

      } catch (error) {
        console.error(error);
        botContentDiv.innerHTML = `<span class='text-red-400'>${t('errBackend')}</span>`;
      } finally {
        resetUI();
        scrollToBottom();

        if (state.pendingTimeUp && state.step !== STEPS.END) {
          setTimeout(triggerTimeUpSequence, 1500);
        }
      }
    }

    async function logToSheet(id, utteranceNum, text) {
      fetch(GOOGLE_SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          action: 'log',
          discussion_id: id,
          utterance_number: utteranceNum,
          message: text,
          timestamp: new Date().toISOString()
        })
      });
    }

    function appendMessage(role, text, save = true) {
      const isUser = role === 'user';
      const bgColor = isUser ? '' : 'bg-[#444654]';
      const icon = isUser
        ? '<div class="h-8 w-8 rounded bg-purple-600 flex items-center justify-center font-bold text-xs">YOU</div>'
        : '<div class="h-8 w-8 rounded bg-green-500 flex items-center justify-center"><svg stroke="currentColor" fill="none" stroke-width="1.5" viewBox="0 0 24 24" class="h-5 w-5 text-white"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8z"></path></svg></div>';

      const html = `
        <div class="w-full text-gray-100 border-b border-black/10 dark:border-gray-900/50 ${bgColor}">
          <div class="flex p-4 gap-4 text-base md:gap-6 md:max-w-2xl lg:max-w-[38rem] xl:max-w-3xl m-auto">
            <div class="flex-shrink-0 flex flex-col relative items-end">
              <div class="w-[30px]">${icon}</div>
            </div>
            <div class="relative flex-1 overflow-hidden">
              <div class="markdown-body w-full">${marked.parse(text)}</div>
            </div>
          </div>
        </div>`;
      chatLog.insertAdjacentHTML('beforeend', html);
      scrollToBottom();
      return chatLog.lastElementChild;
    }

    function resetUI() {
      userInput.disabled = false;
      sendBtn.disabled = false;
      userInput.value = '';
      userInput.style.height = 'auto';
      userInput.focus();
      charCount.textContent = "0 chars";
      window.scrollTo(0, document.body.scrollHeight);
    }

    // ==================================================================================
    // TIMER
    // ==================================================================================
    function startTimer(reset = true) {
      if (reset) {
        state.startTime = Date.now();
        state.warningSent = false;
        state.pendingTimeUp = false;
      }
      if (state.timerInterval) clearInterval(state.timerInterval);

      state.timerInterval = setInterval(() => {
        if (!state.startTime) return;

        const elapsed = Date.now() - state.startTime;
        const remaining = Math.max(0, SESSION_DURATION_MS - elapsed);

        const m = Math.floor(remaining / 60000);
        const s = Math.floor((remaining % 60000) / 1000);
        const text = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;

        timerDisplay.textContent = text;
        mobileTimer.textContent = text;

        if (elapsed > WARNING_TIME_MS) {
          timerDisplay.classList.add('timer-warning');
          if (!state.warningSent) {
            state.warningSent = true;
            injectSystemMessage(t('timeUpWarning'));
          }
        }

        if (remaining <= 0 && state.step !== STEPS.LAST_TURN && state.step !== STEPS.END) {
          if (userInput.value.trim().length > 0) {
            state.pendingTimeUp = true;
          } else {
            triggerTimeUpSequence();
          }
        }
      }, 1000);
    }

    function triggerTimeUpSequence() {
      if (state.timerInterval) clearInterval(state.timerInterval);
      state.step = STEPS.LAST_TURN;
      const msg = t('timeUpFinal');
      processTurn(null, msg);
      state.pendingTimeUp = false;
    }

    function injectSystemMessage(text) {
      state.utteranceCount++;
      appendMessage('assistant', text);
      state.history.push({ role: 'assistant', content: text });
      logToSheet(state.discussionId, state.utteranceCount, text).catch(console.error);
      saveState();
    }

    function scrollToBottom() {
      const container = document.getElementById('chat-container');
      setTimeout(() => {
        container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
      }, 100);
    }

    // ==================================================================================
    // END / RESET / VALIDATION
    // ==================================================================================
    function updateEndButtonVisibility() {
      const desktopBtn = document.getElementById('end-btn-desktop');
      const mobileBtn = document.getElementById('end-btn-mobile');
      if (state.llmTurnCount >= 2 && state.step !== STEPS.END) {
        desktopBtn.classList.remove('hidden');
        desktopBtn.classList.add('flex');
        mobileBtn.classList.remove('hidden');
      } else {
        desktopBtn.classList.add('hidden');
        desktopBtn.classList.remove('flex');
        mobileBtn.classList.add('hidden');
      }
    }

    function triggerEndChat() {
      if (state.step === STEPS.END) return;
      state.step = STEPS.END;
      processTurn(null, t('finalMessage'));
      updateEndButtonVisibility();
    }

    function showToast(message) {
      const toast = document.getElementById('toast-notification');
      const msgSpan = document.getElementById('toast-message');
      msgSpan.textContent = message;
      toast.classList.remove('hidden');
      setTimeout(() => toast.classList.remove('opacity-0'), 10);
      setTimeout(() => {
        toast.classList.add('opacity-0');
        setTimeout(() => toast.classList.add('hidden'), 500);
      }, 3000);
    }

    function validateInput(text) {
      // keep your min length rule only once the conversation started
      if (state.step === STEPS.NATURAL_CONVERSATION) {
        if (text.match(/fin|stop|bye|quit|terminer|おわり|終了/i)) return true;
        if (text.length < 2) {
          showToast(t('minCharWarning'));
          return false;
        }
      }
      return true;
    }

    function endChat() {
      userInput.disabled = true;
      userInput.placeholder = "Discussion terminée / Chat ended.";
      if (state.timerInterval) clearInterval(state.timerInterval);
    }

    function resetChat() {
      localStorage.removeItem('ai_motion_state');
      resetState();
      updateEndButtonVisibility();
      chatLog.innerHTML = '';
      welcomeScreen.classList.remove('hidden');
      chatLog.classList.add('hidden');
      if (state.timerInterval) clearInterval(state.timerInterval);
      timerDisplay.textContent = "00:00";
      timerDisplay.classList.remove('timer-warning');
      init();
    }

    // ==================================================================================
    // EVENTS
    // ==================================================================================
    langSelector.addEventListener('change', (e) => {
      state.lang = e.target.value;
      updateLanguageUI();
      if (state.utteranceCount === 0) resetChat();
      saveState();
    });

    sendBtn.addEventListener('click', () => {
      const text = userInput.value.trim();
      if (text && validateInput(text)) processTurn(text);
    });

    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        setTimeout(() => {
          const text = userInput.value.trim();
          if (text && validateInput(text)) processTurn(text);
        }, 10);
      }
    });

    userInput.addEventListener('input', () => {
      charCount.textContent = userInput.value.length + " chars";
      userInput.style.height = 'auto';
      userInput.style.height = (userInput.scrollHeight) + 'px';
    });

    startBtn.addEventListener('click', () => processTurn(null));

    document.getElementById('new-chat-desktop').addEventListener('click', resetChat);
    document.getElementById('new-chat-mobile').addEventListener('click', resetChat);
    document.getElementById('end-btn-desktop').addEventListener('click', triggerEndChat);
    document.getElementById('end-btn-mobile').addEventListener('click', triggerEndChat);

    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
